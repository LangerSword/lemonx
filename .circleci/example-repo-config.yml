# Auto-generated by lemonx — AI-powered test generation, execution, and self-healing fixes
#
# This config runs on a CircleCI machine runner that has the lemon.test platform
# pre-installed. The runner clones your repo, generates tests, runs them, and
# applies fixes — all on your own infrastructure.
#
# No webhook, no tunnel, no external server needed.

version: 2.1

workflows:
  ai-test-and-fix:
    jobs:
      - ai-test-loop:
          filters:
            branches:
              ignore: main

jobs:
  ai-test-loop:
    machine: true
    resource_class: <namespace>/<resource-class>
    working_directory: ~/project
    steps:
      - checkout

      - run:
          name: Run lemon.test AI test-fix loop
          command: |
            echo "🍋 Running AI test generation, execution, and self-healing fixes..."

            cd ~/project

            RESPONSE=$(npx tsx /home/circleci/lemon/src/index.ts 2>&1)

            echo "$RESPONSE"

            if echo "$RESPONSE" | grep -q "⚠️.*Max iterations reached"; then
              echo "⚠️  AI could not fix all tests within the iteration limit"
              exit 1
            fi

            if echo "$RESPONSE" | grep -q "❌"; then
              echo "❌ AI test loop failed"
              exit 1
            fi

            echo "✅ All tests passed"

  ai-generate-tests:
    machine: true
    resource_class: <namespace>/<resource-class>
    working_directory: ~/project
    steps:
      - checkout

      - run:
          name: Generate AI tests
          command: |
            echo "🍋 Generating tests..."
            npx tsx /home/circleci/lemon/src/index.ts --generate-only

  ai-run-tests:
    machine: true
    resource_class: <namespace>/<resource-class>
    working_directory: ~/project
    steps:
      - checkout

      - run:
          name: Run existing tests
          command: |
            echo "🍋 Running tests..."
            npx vitest run --reporter=verbose
